<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spamming Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group input {
            background-color: var(--surface-light);
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2);
        }
        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.8rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    
    <div class="app-container login-container">
        <div class="panel-card">
            <div class="panel-header" style="text-align: center; margin-bottom: 2rem;">
                <div class="logo-icon" style="margin: 0 auto 1rem auto; width: 48px; height: 48px; justify-content: center;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; color: var(--primary);">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                </div>
                <h2>Welcome Back</h2>
                <p>Log in to access your dashboard</p>
            </div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            <br>
            {% endif %}

            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="email" style="color: var(--text-secondary); font-weight: 500; font-size: 0.9rem;">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password" style="color: var(--text-secondary); font-weight: 500; font-size: 0.9rem;">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
