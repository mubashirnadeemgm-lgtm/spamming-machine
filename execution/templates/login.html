<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SpamMachine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font: 'Inter', -apple-system, sans-serif;
            --bg: #050505;
            --yellow: #facc15;
            --yellow-dim: rgba(250, 204, 21, 0.08);
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            z-index: 0;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -50px;
            background: var(--yellow);
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -60px;
            background: #f59e0b;
            opacity: 0.12;
        }

        /* Login Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 44px 36px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .login-logo-icon {
            width: 38px;
            height: 38px;
            background: var(--yellow);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo-icon svg {
            width: 18px;
            height: 18px;
            color: #000;
        }

        .login-logo span {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .login-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-family: var(--font);
            font-size: 0.92rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--yellow);
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.08);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-error {
            text-align: center;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            color: #f87171;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--yellow);
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            box-shadow: 0 4px 25px rgba(250, 204, 21, 0.3);
            transform: translateY(-1px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--yellow);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
            </div>
            <span>SpamMachine</span>
        </div>

        <h2 class="login-title">Welcome back</h2>
        <p class="login-subtitle">Sign in to access the console</p>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username" placeholder="Enter your username"
                    required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password"
                    placeholder="Enter your password" required>
            </div>
            <button class="login-btn" type="submit">Sign In</button>
        </form>

        <a href="/" class="back-link">← Back to home</a>
    </div>
</body>

</html>
